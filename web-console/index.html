<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taonix 控制台 v22.0.0 - Honor Hub</title>
    <style>
      :root {
        --primary: #3b82f6;
        --bg: #0f172a;
        --card-bg: #1e293b;
        --text: #e2e8f0;
        --text-muted: #94a3b8;
        --border: #334155;
        --success: #22c55e;
        --warning: #f59e0b;
        --danger: #ef4444;
        --perf: #8b5cf6;
        --honor: #fbbf24;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }
      .container { max-width: 2800px; margin: 0 auto; padding: 10px; }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
        margin-bottom: 10px;
      }
      h1 { font-size: 18px; display: flex; align-items: center; gap: 8px; }
      .badge { background: var(--primary); padding: 2px 10px; border-radius: 10px; font-size: 10px; }
      
      /* 成就牆 */
      .achievement-wall {
        display: flex; gap: 10px; padding: 10px; background: rgba(251, 191, 36, 0.1);
        border: 1px solid var(--honor); border-radius: 8px; margin-bottom: 15px;
      }
      .medal { font-size: 20px; display: flex; flex-direction: column; align-items: center; min-width: 80px; }
      .medal-name { font-size: 8px; color: var(--honor); margin-top: 4px; font-weight: bold; }

      .main-grid {
        display: grid;
        grid-template-columns: 180px 200px 220px 250px 1fr 1fr 1fr 1fr 200px;
        gap: 6px;
      }
      
      .card {
        background: var(--card-bg);
        border-radius: 8px;
        padding: 8px;
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        margin-bottom: 6px;
      }
      .card h2 { font-size: 9px; margin-bottom: 6px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
      
      .scroll-area { flex: 1; overflow-y: auto; max-height: 850px; padding-right: 2px; }
      .item { padding: 4px; border-bottom: 1px solid var(--border); font-size: 9px; line-height: 1.2; }
      
      .perf-bar { height: 4px; background: #334155; border-radius: 2px; margin-top: 4px; overflow: hidden; }
      .perf-fill { height: 100%; background: var(--perf); transition: width 0.5s; }
      .honor-text { color: var(--honor); font-size: 7px; margin-left: 5px; }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🚀 Taonix Hub <span class="badge">v22.0.0</span></h1>
        <div id="achievementWall" class="achievement-wall">
          <div style="font-size:10px; color:var(--honor)">🎖️ 團隊成就牆：尚無榮譽解鎖</div>
        </div>
      </header>

      <div class="main-grid">
        <div class="card"><h2>👥 Registry</h2><div class="scroll-area" id="registryList"></div></div>
        <div class="card"><h2>⚡ Perf & Honor</h2><div class="scroll-area" id="perfList"></div></div>
        <div class="card"><h2>🧹 Lifecycle & GC</h2><div class="scroll-area" id="gcList"></div></div>
        <div class="card"><h2>📈 Value</h2><div id="valStats" class="item"></div></div>
        <div class="card"><h2>⛓️ Workflows</h2><div class="scroll-area" id="workflowList"></div></div>
        <div class="card"><h2>🛡️ Squads</h2><div class="scroll-area" id="squadList"></div></div>
        <div class="card"><h2>🛡️ Security</h2><div class="scroll-area" id="auditList"></div></div>
        <div class="card"><h2>🧠 Blackboard</h2><div class="scroll-area" id="thoughtList"></div></div>
        <div class="card"><h2>📡 Events</h2><div class="scroll-area" id="eventList"></div></div>
      </div>
    </div>

    <script>
      async function update() {
        try {
          const bbRes = await fetch('/.data/blackboard_state.json');
          if (bbRes.ok) {
            const bb = await bbRes.json();
            renderAchievements(bb.facts?.team_achievements?.value || []);
            renderPerf(bb.facts || {});
            renderThoughts(bb.thoughts || []);
          }
          // ... 其他數據讀取 (省略) ...
        } catch (e) { console.error(e); }
      }

      function renderAchievements(list) {
        if (!list.length) return;
        document.getElementById('achievementWall').innerHTML = list.map(a => `
          <div class="medal" title="${a.desc}">
            🏆 <span class="medal-name">${a.name}</span>
          </div>
        `).join('');
      }

      function renderPerf(facts) {
        const perfFacts = Object.entries(facts).filter(([k]) => k.startsWith('performance_'));
        document.getElementById('perfList').innerHTML = perfFacts.map(([k, f]) => {
          const agent = k.replace('performance_', '');
          const ms = f.value.lastDuration;
          return `<div class="item"><b>${agent}</b>: ${ms}ms <div class="perf-bar"><div class="perf-fill" style="width:50%"></div></div></div>`;
        }).join('');
      }

      function renderThoughts(thoughts) {
        document.getElementById('thoughtList').innerHTML = thoughts.reverse().slice(0, 15).map(t=>`
          <div class="item"><b>${t.agent}</b>: ${t.content.substring(0,40)}</div>
        `).join('');
      }

      setInterval(update, 2000);
      update();
    </script>
  </body>
</html>
